# ═══════════════════════════════════════════════════════════════
# SentinelX — ConfigMap
# Stores non-sensitive configuration as key-value pairs
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinelx-config
  namespace: sentinelx
data:
  DATABASE_URL: "sqlite:////data/sentinelx.db"
  BACKEND_URL: "http://sentinelx-backend:8003"
  BACKEND_PORT: "8003"
  FRONTEND_PORT: "8503"
  DEBUG: "false"
  ADMIN_USERNAME: "admin"
  ADMIN_EMAIL: "admin@sentinelx.local"
