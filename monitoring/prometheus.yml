# ═══════════════════════════════════════════════════════════════
# SentinelX — Prometheus Configuration
# Scrapes metrics from the backend every 15 seconds
# ═══════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s     # How often to collect metrics

scrape_configs:
  # Monitor Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Monitor SentinelX Backend
  - job_name: "sentinelx-backend"
    static_configs:
      - targets: ["backend:8003"]
    metrics_path: /metrics
